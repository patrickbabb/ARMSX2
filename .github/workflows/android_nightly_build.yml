name: Android Nightly Debug Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'

  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      package_name: ${{ steps.package_info.outputs.PACKAGE_NAME }}
      version_name: ${{ steps.package_info.outputs.VERSION_NAME }}
      release_tag: ${{ steps.release_vars.outputs.RELEASE_TAG }}
      release_title: ${{ steps.release_vars.outputs.RELEASE_TITLE }}

    steps:
      - name: Checkout of code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Init mapped submodules only (Gitea-safe)
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t SUBMODULE_PATHS < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
          if [ "${#SUBMODULE_PATHS[@]}" -eq 0 ]; then
            echo "No mapped submodules found in .gitmodules"
            exit 0
          fi

          git submodule sync -- "${SUBMODULE_PATHS[@]}"
          git -c protocol.version=2 submodule update --init --force --depth=1 --recursive -- "${SUBMODULE_PATHS[@]}"

          # libadrenotools has its own nested submodule (lib/linkernsbypass).
          # Initialize it explicitly because some Gitea runners skip nested updates.
          if [ -f "app/src/main/cpp/3rdparty/libadrenotools/.gitmodules" ]; then
            git -C app/src/main/cpp/3rdparty/libadrenotools submodule sync --recursive
            git -C app/src/main/cpp/3rdparty/libadrenotools -c protocol.version=2 submodule update --init --force --depth=1 --recursive
          fi

          # Fallback for environments where nested submodule checkout is incomplete.
          if [ ! -f "app/src/main/cpp/3rdparty/libadrenotools/lib/linkernsbypass/CMakeLists.txt" ]; then
            echo "Nested submodule missing CMakeLists.txt, cloning fallback copy of liblinkernsbypass."
            rm -rf app/src/main/cpp/3rdparty/libadrenotools/lib/linkernsbypass
            git clone --depth=1 https://github.com/bylaws/liblinkernsbypass.git app/src/main/cpp/3rdparty/libadrenotools/lib/linkernsbypass
          fi

      - name: Java and Android SDK Setup
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Android SDK Setup
        uses: android-actions/setup-android@v3

      - name: Configure Android SDK for Gradle
        shell: bash
        run: |
          set -euo pipefail

          SDK_DIR="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "${SDK_DIR}" ] || [ ! -d "${SDK_DIR}" ]; then
            for d in "$HOME/Android/Sdk" "/usr/local/lib/android/sdk" "/opt/android-sdk"; do
              if [ -d "$d" ]; then
                SDK_DIR="$d"
                break
              fi
            done
          fi

          if [ -z "${SDK_DIR}" ] || [ ! -d "${SDK_DIR}" ]; then
            echo "Android SDK directory not found."
            exit 1
          fi

          echo "ANDROID_SDK_ROOT=${SDK_DIR}" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=${SDK_DIR}" >> "$GITHUB_ENV"
          echo "sdk.dir=${SDK_DIR}" > local.properties
          echo "Using Android SDK at ${SDK_DIR}"

          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "cmake;3.22.1"

      # --- Build Phase ---
      - name: Running the Debug Build (only Nightly)
        run: ./gradlew assembleUnrestrictedDebug

      - name: Get Package Name and Version
        id: package_info
        run: |
          PACKAGE_NAME=$(grep 'applicationId' app/build.gradle | head -n 1 | awk '{print $2}' | tr -d '"')
          VERSION_NAME=$(grep 'versionName' app/build.gradle | head -n 1 | awk '{print $2}' | tr -d '"')
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Defining the Release Tag and Title
        id: release_vars
        run: |
          # The release tag will be in the format: come.nanodata.armsx2-nightly-1.0.4-20251104-1411
          DATE_TIME=$(date +%Y%m%d-%H%M)
          FULL_TAG="${{ steps.package_info.outputs.PACKAGE_NAME }}-nightly-${{ steps.package_info.outputs.VERSION_NAME }}-${DATE_TIME}"
          TITLE="Nightly Build (DEBUG - ${{ steps.package_info.outputs.VERSION_NAME }}) - ${DATE_TIME}"
          
          echo "RELEASE_TAG=$FULL_TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=$TITLE" >> $GITHUB_OUTPUT

      - name: Find and Rename APK to Nightly
        id: rename_apk
        run: |
          ORIGINAL_PATH=$(find ${{ github.workspace }}/app/build -type f -name "*debug.apk" -print -quit)
          if [ -z "$ORIGINAL_PATH" ]; then
            echo "CRITICAL ERROR: Debug APK non found."
            exit 1 
          fi
          NEW_FILE_PATH=$(echo "$ORIGINAL_PATH" | sed 's/-debug.apk/-nightly.apk/')
          mv "$ORIGINAL_PATH" "$NEW_FILE_PATH"
          echo "APK_FILE_NIGHTLY=$NEW_FILE_PATH" >> $GITHUB_OUTPUT
          echo "APK renamed and saved in: $NEW_FILE_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ steps.package_info.outputs.PACKAGE_NAME }}
          path: ${{ steps.rename_apk.outputs.APK_FILE_NIGHTLY }}

  release:
    permissions:
      contents: write

    needs: [ build ]

    if: >
      github.repository == 'ARMSX2/ARMSX2' &&
      github.ref == 'refs/heads/master'

    runs-on: ubuntu-latest

    concurrency:
      group: release
      cancel-in-progress: false

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ needs.build.outputs.package_name }}
          path: artifact

      - name: Create the Release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: ${{ needs.build.outputs.release_title }}
          body: |
            ## Automatic Night Release (DEBUG)
            
            Automated build for community testing. This is an **unsigned** build for public distribution.
            
            * **Version:** ${{ needs.build.outputs.version_name }}
            * **Package Name:** ${{ needs.build.outputs.package_name }}
            * **Branch:** ${{ github.ref_name }}
            * **Commit:** ${{ github.sha }}
            
            **Check the attached assets for the NIGHTLY APK.**
          draft: false
          prerelease: true
          files: artifact/*.apk
